# ========================================================================
# НАСТРОЙКИ КОНТРОЛЯ СООТВЕТСТВИЯ ТРЕБОВАНИЯМ БЕЗОПАСНОСТИ (РД АС / РД СВТ)
# ========================================================================
# Вы можете редактировать значения параметров для каждого класса защищенности.
# Скрипт "security_checker.sh" считывает этот файл при комплаенс-контроле.

[3Б]
# Минимальная длина пароля
req_len=6
# Требование к истории повторения паролей
req_hist=0
# Максимальный срок действия пароля в днях
req_max_days=180
# Число попыток входа до блокировки
req_deny=5
# Время блокировки аккаунта в секундах
req_unlock_time=300
# Таймаут неактивности сессии в секундах
req_tmout=1800
# Безопасное удаление файлов (SecDel)
req_secdel=optional
# Очистка Swap при выключении
req_swap=optional
# Блокировка переключения TTY-консолей
req_console=optional
# Блокировка трассировки процессов (ptrace)
req_ptrace=optional
# Ограничение консольных интерпретаторов
req_interpreters=optional
# Режим службы аудита auditd
req_audit=optional

